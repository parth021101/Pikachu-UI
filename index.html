<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon UI</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main">
      <header>
        <nav class="nav-bar">
          <img
            src="assets/pokemon_logo(300).png"
            alt="Pokemon Logo"
            class="logo"
          />
          <i class="bi bi-list" id="menuIcon"></i>
        </nav>
      </header>
      <div class="left-panel">
        <div class="content">
          <span class="label">pokemon gen i</span>
          <h1 class="heading">pikachu</h1>
          <p class="description">
            Pikachu is an Electric-type Pokémon introduced in Generation I.
            Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
            They are almost completely covered by yellow fur.
          </p>
          <div class="counter">
            <span class="line"></span>
            <span class="number">01 / 08</span>
          </div>
        </div>
      </div>
      <div class="right-panel"></div>
      <img src="assets/pikachu_img.png" alt="Pikachu" class="pikachu" />
      <img src="assets/pokeball_img.webp" alt="Pokeball" class="pokeball" />
      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </body>
</html>
